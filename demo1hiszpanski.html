let MATRIX_MODE = null; // globalnie ustawiany tryb

function chooseMatrixModeIfNeeded() {
    return new Promise((resolve) => {
        $('#multiVersionText').text(
            `Jest fiszki z wieloma wersjami. Jak chcesz pracować?`
        );
        $('#multiVersionOverlay').fadeIn();

        $('#modeRandom').off('click').on('click', function () {
            MATRIX_MODE = 'RANDOM';
            $('#multiVersionOverlay').fadeOut();
            console.log("TRYB:", MATRIX_MODE);
            resolve(MATRIX_MODE); // rozwiąż promise
        });

        $('#modeApprove').off('click').on('click', function () {
            MATRIX_MODE = 'APPROVE';
            $('#multiVersionOverlay').fadeOut();
            console.log("TRYB:", MATRIX_MODE);
            resolve(MATRIX_MODE); // rozwiąż promise
        });
    });
}
